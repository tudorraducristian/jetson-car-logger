<div class="grid grid-cols-2 gap-4 sm:grid-cols-3">
  <div class="rounded-lg border border-ink-700 bg-ink-900 px-4 py-3">
    <p class="font-mono text-[11px] uppercase tracking-widest text-paper-faint">Evenimente</p>
    <p class="pop-in mt-1 font-mono text-3xl text-paper">{{ stats.total_events }}</p>
  </div>
  <div class="rounded-lg border border-ink-700 bg-ink-900 px-4 py-3">
    <p class="font-mono text-[11px] uppercase tracking-widest text-paper-faint">Vehicule unice</p>
    <p class="pop-in mt-1 font-mono text-3xl text-paper">{{ stats.unique_vehicles }}</p>
  </div>
  <div class="rounded-lg border border-ink-700 bg-ink-900 px-4 py-3">
    <p class="font-mono text-[11px] uppercase tracking-widest text-gold">Plăcuțe citite</p>
    <p class="pop-in mt-1 font-mono text-3xl text-gold">{{ stats.plates_read }}</p>
  </div>
</div>

<p class="mt-3 flex flex-wrap items-center gap-x-4 gap-y-1 font-mono text-[11px] text-paper-faint">
  <span class="inline-flex items-center gap-1.5">
    <span class="h-1.5 w-1.5 rounded-full {{ 'bg-emerald-400 animate-pulse' if pipeline_running else 'bg-rose-400' }}"></span>
    pipeline {{ 'activ' if pipeline_running else 'oprit' }}
  </span>
  <span>{{ fps }} fps</span>
  <span>cameră: {{ 'ok' if camera_ok else 'fără semnal' }}</span>
  <span>coadă ANPR: {{ anpr_queue }}</span>
</p>
