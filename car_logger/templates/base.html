<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Car Logger{% endblock %}</title>
  <link rel="icon" href="data:,">

  {# Tailwind Play CDN — no build step, per CLAUDE.md. #}
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            mono: ['"DM Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            /* OLED-dark editorial palette: near-black inks, warm paper
               text, a single gold accent. */
            ink:   { 950: '#0a0a0c', 900: '#111114', 850: '#16161a',
                     800: '#1d1d23', 700: '#2a2a32' },
            paper: { DEFAULT: '#e9e6df', dim: '#a8a49b', faint: '#6b6862' },
            gold:  { DEFAULT: '#d4a843', dim: '#8a6d2b' },
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  {# htmx — the whole "framework". Pinned version, single script tag. #}
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  {# SSE extension — same pinned version as htmx core. #}
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>

  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 4px; }
    ::selection { background: #d4a843; color: #0a0a0c; }

    /* v1.1 "living dashboard" motion. Entrance animations replay whenever
       htmx re-inserts a fragment; the reduced-motion rule below disables
       everything for users who ask for no motion. */
    @keyframes row-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes gold-flash {
      from { box-shadow: inset 3px 0 0 #d4a843; }
      to   { box-shadow: inset 3px 0 0 rgba(212, 168, 67, 0); }
    }
    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .row-new { animation: row-in 300ms ease-out, gold-flash 2s ease-out forwards; }
    .pop-in  { animation: pop-in 250ms ease-out; }
    .fade-up { animation: fade-up 250ms ease-out; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body class="bg-ink-950 text-paper antialiased min-h-screen">
  {% block content %}{% endblock %}
</body>
</html>
